name: Market Alert Bot

on:
  schedule:
    - cron: "0 4 * * 1-5"
    - cron: "0 7 * * 1-5"
    - cron: "0 10 * * 1-5"

  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install -r requirements.txt
          python src/main.py
